worker_processes  1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name api.quemepongo.baselinux.net;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name www.quemepongo.baselinux.net quemepongo.baselinux.net;

        location / {
            return 301 https://www.quemepongo.baselinux.net$request_uri;
        }
       sudo nginx -t
    sudo systemctl restart nginx
    curl -I https://api.quemepongo.baselinux.net/items
    curl -I https://www.quemepongo.baselinux.net    sudo nginx -t
    sudo systemctl restart nginx
    curl -I https://api.quemepongo.baselinux.net/items
    curl -I https://www.quemepongo.baselinux.net }

    server {
        listen 443 ssl http2;
        server_name api.quemepongo.baselinux.net;

        ssl_certificate /etc/letsencrypt/live/api.quemepongo.baselinux.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.quemepongo.baselinux.net/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # Backend API only
        location / {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl http2;
        server_name www.quemepongo.baselinux.net quemepongo.baselinux.net;

        ssl_certificate /etc/letsencrypt/live/www.quemepongo.baselinux.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.quemepongo.baselinux.net/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # Frontend React app
        root /var/www/html/dist;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
